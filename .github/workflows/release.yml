name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Builds the node bundle and publishes it to npm as `@marshell/chifu-wizard`
# with provenance attestation.
#
# Maintainer setup (one-time): add an npm automation token as the repository
# secret `NPM_TOKEN` (npmjs.com → Access Tokens → Generate → Automation).

on:
  push:
    tags:
      - "v*"

jobs:
  npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance attestation
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # actions/setup-node configures ~/.npmrc to read NODE_AUTH_TOKEN, which the
      # publish step below provides from the NPM_TOKEN secret.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      # Build the node bundle explicitly so the artifact exists even though npm's
      # prepublishOnly hook would also run it.
      - name: Build node bundle
        run: bun run build

      - name: Smoke-test the node bundle
        run: |
          node dist/cli.js --help
          node dist/cli.js --agent

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
